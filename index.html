<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Portal | Integral Solutions</title>
    <style>
        :root {
            --brand-blue: #004a99;
            --accent-bg: #f8fafc;
            --text-dark: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--accent-bg);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-dark);
        }

        .header {
            width: 100%; background: white; padding: 20px 0;
            text-align: center; border-bottom: 1px solid #e2e8f0; margin-bottom: 30px;
        }

        .logo { max-width: 220px; height: auto; }

        .support-container {
            background: white; width: 95%; max-width: 650px;
            padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border-top: 6px solid var(--brand-blue);
            margin-bottom: 40px; box-sizing: border-box;
        }

        h1 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--brand-blue); }
        .sub { color: #64748b; margin-bottom: 30px; font-size: 0.95rem; }

        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }

        label { font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; color: #475569; }

        input, select, textarea {
            padding: 12px; border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 1rem; width: 100%; box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--brand-blue);
            box-shadow: 0 0 0 3px rgba(0, 74, 153, 0.1);
        }

        .full-width { margin-bottom: 20px; }

        .file-box {
            background: #f1f5f9; border: 2px dashed var(--border-color);
            padding: 20px; border-radius: 8px; text-align: center; margin-top: 5px;
        }

        .submit-btn {
            background: var(--brand-blue); color: white; border: none;
            width: 100%; padding: 16px; font-size: 1rem; font-weight: 700;
            border-radius: 6px; cursor: pointer; transition: background 0.2s;
            margin-top: 10px; text-transform: uppercase;
        }

        .submit-btn:hover { background: #003a7a; }

        @media (max-width: 600px) { .form-row { flex-direction: column; gap: 20px; } }
    </style>
</head>
<body>

    <div class="header">
        <img src="integrallogo.png" alt="Integral Solutions Logo" class="logo">
    </div>

    <div class="support-container">
        <h1>Submit Support Ticket</h1>
        <p class="sub">Direct to: <strong>tickets@integralsolutions.ca</strong></p>

        <form action="https://formspree.io/f/xyknlojw" method="POST" enctype="multipart/form-data">

            <input type="hidden" name="_subject" value="NEW TICKET: Integral Solutions Portal">
            <input type="hidden" name="_next" value="thanks.html">

            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="user@company.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority" required>
                        <option value="Standard">Standard</option>
                        <option value="Urgent">Urgent</option>
                        <option value="Administrative">Administrative</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Direct Contact Number</label>
                    <input type="tel" name="phone" placeholder="(555) 000-0000">
                </div>
            </div>

            <div class="full-width">
                <label>Location</label>
                <select name="location" required>
                    <option value="" disabled selected>Select a location...</option>
                    <option value="1871">1871</option>
                    <option value="840">840</option>
                    <option value="HATM">HATM</option>
                </select>
            </div>

            <div class="full-width">
                <label>Request Description</label>
                <textarea name="description" rows="4" placeholder="How can we help?" required></textarea>
            </div>

            <div class="full-width">
                <label>Additional Information</label>
                <textarea name="additional_info" rows="2" placeholder="Optional details..."></textarea>
            </div>

            <div class="full-width">
                <label>Screenshots / Attachments</label>
                <div class="file-box">
                    <input type="file" name="upload" accept="image/*" multiple>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Ticket</button>
        </form>
    </div>

    <footer style="margin-bottom: 40px; color: #94a3b8; font-size: 0.8rem;">
        &copy; 2026 Integral Solutions
    </footer>

</body>
</html>
